esphome:
  name: shaker2 
  
substitutions:
  device_name: shaker2
  device_internal_name: shaker2
  device_sampling_time: 10s  # Adjust the sampling time as needed
  friendly_name: Shaker 2

api:

# ports
# GPIO 16 is used for the red led
# GPIO 2 is used for the status LED , blue on the nodemcu
# GPIO 15 is used for the relay
# GPIO 0 is used for the button

esp8266:
  board: nodemcuv2
  framework:
    version: recommended

<<: !include ../../../limero.yaml

ota:
  - platform: esphome
mqtt:
  broker: limero.be
  port: 1883 
  id: mqtt_client
  topic_prefix: 'src/${device_name}'
  birth_message:
    topic: src/${device_name}/sys/online
    payload: 'true'
  will_message:
    topic: src/${device_name}/sys/online
    payload: 'false'
  log_topic: src/${device_name}/sys/log
  discovery: true
  on_message:
    - topic: dst/shaker2/shake/trigger
      then:
        - logger.log: "Received shake trigger message"
        - script.execute: cycle_relay

time:
  - platform: sntp
    id: my_time
    timezone: Europe/Brussels
    on_time:
      - seconds: 0
        minutes: 30
        hours: 5
        then:
          - globals.set:
              id: daylight_enable
              value: 'true'
          - logger.log: "Daylight enable switch turned ON at 05:20"
      - seconds: 0
        minutes: 30
        hours: 21
        then:
          - globals.set:
              id: daylight_enable
              value: 'false'
          - logger.log: "Daylight enable switch turned OFF at 22:00"
        
status_led:
  pin: GPIO2

output:
  - platform: gpio
    pin: GPIO15
    id: relay
  - platform: gpio
    pin: GPIO16
    id: red_led
    inverted: true
#  - platform: gpio
#    pin: GPIO2
#    id: blue_led
#    inverted: true

globals:
  - id: daylight_enable
    type: bool
    initial_value: 'true'
    restore_value: true
  - id: relay_duration
    type: int
    initial_value: '2000'  # Duration in milliseconds for which the relay should be activated
  - id: relay_interval
    type: int
    initial_value: '300'  # Interval in seconds for the pump cycle

interval:
  - interval: 3min
    then:
      - logger.log: 
          format: "Current value of daylight_enable: %d" 
          args: [ id(daylight_enable) ]
      - if:
          condition:
            lambda: return id(daylight_enable) == true;
          then:
            - script.execute: cycle_relay
          else:
            - logger.log: "Daylight enable switch is OFF, not activating relay or red LED"

script:
  - id: cycle_relay
    mode: restart
    then:
      - output.turn_on: relay
      - output.turn_on: red_led
      - logger.log: "Relay and red LED turned ON due to daylight enable switch"
      - delay: !lambda return id(relay_duration);
      - output.turn_off: relay
      - output.turn_off: red_led
      - logger.log: "Relay and red LED turned OFF after 3 seconds"
      - switch.turn_off: activate_relay

switch:
  - platform: restart
    name: "Restart"
    id: device_restart
  
  - platform: safe_mode
    name: Use Safe Mode
    id: device_safe_mode

  - platform: template
    name: "Switch Relay shaker2"
    id: activate_relay
    turn_on_action:
      - script.execute: cycle_relay
  - platform: template
    name: "Daylight Shaker2"
    lambda: |-
      if (id(daylight_enable)) {
        return true;
      } else {
        return false;
        }
    turn_on_action:
      - globals.set:
          id: daylight_enable
          value: 'true'
      - logger.log: "Daylight enable switch turned ON"
    turn_off_action:
      - globals.set:
          id: daylight_enable
          value: 'false'
      - logger.log: "Daylight enable switch turned OFF"
    icon: "mdi:weather-sunny"
sensor:  # WiFi
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    id: ${device_internal_name}_wifi_signal_sensor
    update_interval: ${device_sampling_time}

  # Uptime
  - platform: uptime
    name: "Uptime Sensor"
    id: ${device_internal_name}_uptime_sensor
    update_interval: ${device_sampling_time}
    internal: true
    on_raw_value:
      then:
        - text_sensor.template.publish:
            id: ${device_internal_name}_uptime_human
            state: !lambda |-
              int seconds = round(id(${device_internal_name}_uptime_sensor).raw_state);
              int days = seconds / (24 * 3600);
              seconds = seconds % (24 * 3600);
              int hours = seconds / 3600;
              seconds = seconds % 3600;
              int minutes = seconds /  60;
              seconds = seconds % 60;
              return (
                (days ? to_string(days) + "d " : "") +
                (hours ? to_string(hours) + "h " : "") +
                (minutes ? to_string(minutes) + "m " : "") +
                (to_string(seconds) + "s")
              ).c_str();
binary_sensor:
  # ESP Status
  - platform: status
    name: "Status"
    id: ${device_internal_name}_status

text_sensor:
  #-------------------------------------------------------------------------------
  # ESP32 internal sensors
  #-------------------------------------------------------------------------------
  - platform: wifi_info
    ip_address:
      name: IP Address
      id: ${device_internal_name}_ip_address
    ssid:
      name: Connected SSID
      id: ${device_internal_name}_connected_ssid
    mac_address:
      name: Mac Wifi Address
      id: ${device_internal_name}_mac_address

  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true

    # Example configuration entry
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      address_0:
        name: ESP IP Address 0
      address_1:
        name: ESP IP Address 1
      address_2:
        name: ESP IP Address 2
      address_3:
        name: ESP IP Address 3
      address_4:
        name: ESP IP Address 4
    ssid:
      name: ESP Connected SSID
    bssid:
      name: ESP Connected BSSID
    mac_address:
      name: ESP Mac Wifi Address
    scan_results:
      name: ESP Latest Scan Results
    dns_address:
      name: ESP DNS Address

  #-------------------------------------------------------------------------------
  # Custom Text sensors
  #-------------------------------------------------------------------------------
  - platform: template
    name: Uptime Human Readable
    id: ${device_internal_name}_uptime_human
    icon: mdi:clock-start

